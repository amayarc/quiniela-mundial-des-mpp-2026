<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Quiniela Mundial 2026 — DES & MPP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #F26522 0%, #1A3C6E 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 2.2rem; margin-bottom: 16px; letter-spacing: -0.5px; }
    .sub { font-size: 1.05rem; opacity: 0.85; margin-bottom: 28px; }
    .ball { font-size: 4rem; margin-bottom: 16px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .badge {
      display: inline-block;
      background: #FFD700;
      color: #1A3C6E;
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-top: 12px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 32px;
    }
    .stat {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 8px;
    }
    .stat-num { font-size: 1.6rem; font-weight: 700; }
    .stat-lbl { font-size: 0.8rem; opacity: 0.85; }
    footer { margin-top: 32px; font-size: 0.85rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="ball">⚽</div>
    <h1>Quiniela Mundial 2026</h1>
    <p class="sub">DES & MPP · Fase de Grupos</p>
    <div class="badge">🚧 En construcción</div>

    <div class="stat-grid">
      <div class="stat">
        <div class="stat-num">21</div>
        <div class="stat-lbl">Quinielas</div>
      </div>
      <div class="stat">
        <div class="stat-num">72</div>
        <div class="stat-lbl">Partidos</div>
      </div>
    </div>

    <footer>Próximamente: clasificación, partidos, pronósticos por persona y duelos 1v1</footer>
  </div>
</body>
</html>
